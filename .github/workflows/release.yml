name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v1.0.0)'
        required: true
        default: 'v1.0.5'

env:
  XCODE_VERSION: '15.0'

jobs:
  build-and-release:
    name: 构建并发布
    runs-on: macos-latest
    permissions:
      contents: write  # 允许创建 Release 和上传文件
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 设置 Xcode 版本
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: 获取版本号
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${GITHUB_REF#refs/tags/}"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "📦 版本: $VERSION"
    
    - name: 显示构建信息
      run: |
        echo "🏗️ MacAfk 发布构建"
        echo "版本: ${{ env.VERSION }}"
        echo "分支: ${{ github.ref }}"
        echo "提交: ${{ github.sha }}"
        xcodebuild -version

    - name: 检查签名配置
      id: signing
      env:
        MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
        MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
      run: |
        if [ -n "$MACOS_CERTIFICATE_BASE64" ] \
          && [ -n "$MACOS_CERTIFICATE_PASSWORD" ] \
          && [ -n "$MACOS_KEYCHAIN_PASSWORD" ] \
          && [ -n "$MACOS_SIGNING_IDENTITY" ]; then
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "Developer ID signing is enabled."
        else
          echo "enabled=false" >> "$GITHUB_OUTPUT"
          echo "Developer ID signing secrets are not configured; release will use ad-hoc signing."
        fi

    - name: 导入 Developer ID 证书
      if: steps.signing.outputs.enabled == 'true'
      env:
        MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
        MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
      run: |
        CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
        KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

        echo -n "$MACOS_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

        security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security import "$CERTIFICATE_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple: -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security list-keychains -d user -s "$KEYCHAIN_PATH"
        security find-identity -p codesigning -v "$KEYCHAIN_PATH"
    
    - name: 构建所有版本
      env:
        MACOS_SIGNING_IDENTITY: ${{ steps.signing.outputs.enabled == 'true' && secrets.MACOS_SIGNING_IDENTITY || '' }}
        APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
        APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
      run: |
        chmod +x build.sh
        VERSION=${{ env.VERSION }} ./build.sh
    
    - name: 验证构建产物
      run: |
        echo "📦 构建产物："
        ls -lh Dist/
        echo ""
        echo "🔐 校验和："
        cat Dist/checksums.txt
    
    - name: 创建 Release Notes
      id: release_notes
      run: |
        cat > release_notes.md << 'EOF'
        ## MacAfk Pro ${{ env.VERSION }}
        
        ### 📦 下载
        
        选择适合你的版本：
        
        - **通用版本** (Apple Silicon + Intel): `MacAfk-Pro-Universal-${{ env.VERSION }}.dmg` ⭐️ 推荐
        - **Apple Silicon 专用**: `MacAfk-Pro-arm64-${{ env.VERSION }}.dmg`
        - **Intel 专用**: `MacAfk-Pro-x86_64-${{ env.VERSION }}.dmg`

        ### 🚀 本次更新

        - 新增 AI Agent 任务监控区域，可展示正在运行的 Agent、来源软件与任务名称
        - 新增 AI Agent 完成后自动收尾：等待 5 分钟确认无 Agent 工作后，自动关闭抖动、恢复亮度并锁屏
        - 新增定时关闭功能，可在指定时间后关闭防休眠、恢复亮度并锁屏
        - 重构主窗口和设置窗口布局，采用更贴近 macOS Liquid Glass 的标题栏、侧边栏和内容组织
        - 修复只在 Cursor 运行时误显示 Claude Code 的 Agent 识别问题
        - Release 包改为 Developer ID 签名，并在配置公证凭据后自动提交 Apple 公证
        
        ### ✨ 特性
        
        - ✅ 真实硬件亮度控制（DisplayServices API）
        - ✅ 更好的省电效果
        - ✅ 鼠标自动抖动，防止休眠
        - ✅ 快捷键控制（可自定义）
        - ✅ 多语言支持（中文/英文）
        - ✅ 菜单栏小图标，不占用 Dock
        - ✅ 抖动间隔设置持久化
        - ✅ 多架构支持（Apple Silicon + Intel）
        
        ### 🔧 安装说明
        
        1. 下载适合你的 DMG 文件
        2. 打开 DMG，将应用拖到"应用程序"文件夹
        3. 首次运行时，在「系统设置 > 隐私与安全性 > 辅助功能」中授予权限
        
        ### 🔐 校验和
        
        下载后请验证文件完整性：
        
        ```bash
        shasum -a 256 MacAfk-*.dmg
        ```
        
        详细校验和请参见 `checksums.txt`
        
        ### 📝 完整更新日志
        
        请查看 [CHANGELOG.md](CHANGELOG.md) 了解详细更改。
        
        ---
        
        **系统要求**：macOS 26.0 或更高版本
        **安装说明**：如果 Release 已配置 Developer ID 签名和 Apple 公证，下载后可正常打开；如果未配置公证，macOS 可能会显示安全提示，请在「系统设置 > 隐私与安全性」中允许打开。
        **注意**：如果需要 App Store 版本，请访问 [MacAfk Lite 仓库](https://github.com/jiayuqi7813/macAFK-lite)

        EOF
        
        echo "release_notes<<EOF" >> $GITHUB_OUTPUT
        cat release_notes.md >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: 创建 GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ env.VERSION }}
        name: MacAfk ${{ env.VERSION }}
        body_path: release_notes.md
        draft: false
        prerelease: false
        files: |
          Dist/*.dmg
          Dist/checksums.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 上传构建产物到 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MacAfk-Release-${{ env.VERSION }}
        path: |
          Dist/*.dmg
          Dist/checksums.txt
        retention-days: 90
    
    - name: 通知构建完成
      if: success()
      run: |
        echo "🎉 Release 发布成功！"
        echo "版本: ${{ env.VERSION }}"
        echo "查看: https://github.com/${{ github.repository }}/releases/tag/${{ env.VERSION }}"
    
    - name: 通知构建失败
      if: failure()
      run: |
        echo "❌ Release 发布失败"
        echo "请检查构建日志"
